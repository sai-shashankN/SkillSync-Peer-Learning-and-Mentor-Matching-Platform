name: SkillSync CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: skillsync
          POSTGRES_PASSWORD: skillsync
          POSTGRES_DB: skillsync_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build & Test
        run: mvn -B clean verify -pl '!eureka-server,!config-server,!api-gateway' -f backend/pom.xml
      - name: Build Infrastructure Modules
        run: mvn -B clean compile -pl eureka-server,config-server,api-gateway -f backend/pom.xml

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: TypeScript check
        run: npx tsc -b --noEmit
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend

  docker-build:
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Package JARs
        run: mvn -B clean package -DskipTests -f backend/pom.xml
      - name: Build Docker images
        run: |
          for svc in eureka-server config-server api-gateway auth-service user-service mentor-service skill-service session-service payment-service review-service group-service notification-service audit-service; do
            docker build -t skillsync/$svc:latest -f backend/$svc/Dockerfile backend/$svc
          done
          docker build -t skillsync/frontend:latest -f frontend/Dockerfile frontend
          docker build -t skillsync/frontend:latest -f frontend/Dockerfile frontend
