server:
  port: 8083
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/skillsync_mentors
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
internal:
  service-token: ${INTERNAL_SERVICE_TOKEN}
