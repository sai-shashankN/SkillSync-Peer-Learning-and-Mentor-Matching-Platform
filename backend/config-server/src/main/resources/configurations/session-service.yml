server:
  port: 8085
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/skillsync_sessions
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
internal:
  service-token: ${INTERNAL_SERVICE_TOKEN}
