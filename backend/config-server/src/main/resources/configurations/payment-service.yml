server:
  port: 8086
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/skillsync_payments
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
paypal:
  client-id: ${PAYPAL_CLIENT_ID:}
  client-secret: ${PAYPAL_CLIENT_SECRET:}
  webhook-id: ${PAYPAL_WEBHOOK_ID:}
  base-url: ${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
  currency: ${PAYPAL_CURRENCY:USD}
  brand-name: ${PAYPAL_BRAND_NAME:SkillSync}
payments:
  demo-bypass-enabled: ${PAYMENT_DEMO_BYPASS_ENABLED:false}
internal:
  service-token: ${INTERNAL_SERVICE_TOKEN}
