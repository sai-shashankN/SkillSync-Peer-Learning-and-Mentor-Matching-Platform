server:
  port: 8086
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/skillsync_payments
    username: skillsync
    password: skillsync
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
  key-secret: ${RAZORPAY_KEY_SECRET:placeholder_secret}
