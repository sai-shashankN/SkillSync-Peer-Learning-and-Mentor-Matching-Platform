server:
  port: 8086
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/skillsync_payments
    username: skillsync
    password: skillsync
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
paypal:
  client-id: ${PAYPAL_CLIENT_ID:paypal-sandbox-client-id}
  client-secret: ${PAYPAL_CLIENT_SECRET:paypal-sandbox-client-secret}
  base-url: ${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
  currency: ${PAYPAL_CURRENCY:INR}
  brand-name: ${PAYPAL_BRAND_NAME:SkillSync}
