server:
  port: 8090
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/skillsync_audit
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
