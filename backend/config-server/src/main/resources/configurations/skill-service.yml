server:
  port: 8084
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/skillsync_skills
    username: skillsync
    password: skillsync
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
