spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: skillsync
    password: skillsync
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 5000
          max-interval: 30000
          multiplier: 2.0
          max-attempts: 5
    connection-timeout: 10000
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  level:
    com.skillsync: INFO
    org.springframework.amqp.rabbit: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
